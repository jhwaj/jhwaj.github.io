<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aspray - ALL NATURAL Deodorant!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a237e 0%, #000033 70%);
            font-family: 'Impact', 'Arial Black', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 배경 반짝이 효과 */
        .sparkle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkle 2s infinite;
            opacity: 0;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            text-align: center;
        }

        /* 상단 배너 - BUT WAIT 스타일 */
        .top-banner {
            background: #ff0000;
            color: white;
            padding: 0.8rem 2rem;
            font-size: 1.8rem;
            letter-spacing: 3px;
            animation: bannerPulse 1s infinite;
            border-radius: 5px;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        @keyframes bannerPulse {
            0%, 100% { transform: scale(1); background: #ff0000; }
            50% { transform: scale(1.05); background: #ff3333; }
        }

        /* 가격 섹션 */
        .price-section {
            position: relative;
            margin: 1.5rem 0;
            animation: priceSlide 1s ease-out;
        }

        @keyframes priceSlide {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .price-only {
            color: #ffdd00;
            font-size: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .price-main {
            color: #ffffff;
            font-size: 5rem;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            animation: priceBounce 2s infinite;
            line-height: 1;
        }

        .price-main sup {
            font-size: 2.5rem;
            vertical-align: super;
        }

        .price-sub {
            color: #aaaaff;
            font-size: 1rem;
            font-family: Arial, sans-serif;
        }

        @keyframes priceBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 제품 이미지 영역 */
        .product-area {
            position: relative;
            margin: 2rem 0;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }

        .product-bottle {
            width: 150px;
            height: 250px;
            background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%);
            border-radius: 15px 15px 25px 25px;
            position: relative;
            animation: bottleBounce 3s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(255, 153, 0, 0.4);
        }

        .product-bottle::before {
            content: '';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 40px;
            background: #ff3333;
            border-radius: 5px 5px 0 0;
        }

        .product-bottle::after {
            content: 'Aspray';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            color: #cc0000;
            font-style: italic;
            font-weight: bold;
        }

        @keyframes bottleBounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(3deg); }
            75% { transform: translateY(-10px) rotate(-3deg); }
        }

        .product-pen {
            width: 40px;
            height: 220px;
            background: linear-gradient(90deg, #ff0000 0%, #cc0000 50%, #ff0000 100%);
            border-radius: 5px;
            position: relative;
            animation: penSlide 2s ease-in-out infinite;
            transform-origin: bottom center;
        }

        .product-pen::before {
            content: 'Aspray';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            font-size: 0.8rem;
            color: #ffcc00;
            white-space: nowrap;
            font-weight: bold;
        }

        @keyframes penSlide {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* FREE 태그 */
        .free-tag {
            position: absolute;
            top: 10px;
            left: 10%;
            background: #00ff00;
            color: #000;
            padding: 0.5rem 1.5rem;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 5px;
            animation: freeFlash 0.8s infinite;
            z-index: 10;
        }

        @keyframes freeFlash {
            0%, 100% { opacity: 1; transform: scale(1) rotate(-5deg); }
            50% { opacity: 0.7; transform: scale(1.1) rotate(-5deg); }
        }

        /* Portable Pocket Shot 텍스트 */
        .bonus-text {
            color: #00ffaa;
            font-size: 1.8rem;
            text-shadow: 0 0 10px #00ffaa;
            animation: bonusGlow 1.5s infinite alternate;
            margin: 1rem 0;
        }

        @keyframes bonusGlow {
            from { text-shadow: 0 0 10px #00ffaa, 0 0 20px #00ffaa; }
            to { text-shadow: 0 0 20px #00ffaa, 0 0 40px #00ffaa, 0 0 60px #00ffaa; }
        }

        /* 30 Day Money Back */
        .guarantee {
            color: #ffdd00;
            font-size: 1.3rem;
            font-style: italic;
            font-family: 'Georgia', serif;
            margin: 1.5rem 0;
            animation: guaranteeSlide 4s infinite;
        }

        @keyframes guaranteeSlide {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* 웹사이트 주소 하단 바 */
        .website-bar {
            background: linear-gradient(90deg, #000066, #0000cc, #000066);
            padding: 1.2rem;
            border-radius: 10px;
            margin-top: 2rem;
            animation: barGlow 2s infinite;
        }

        .website-bar a {
            color: #ffffff;
            font-size: 2.5rem;
            text-decoration: none;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #6666ff;
        }

        @keyframes barGlow {
            0%, 100% { box-shadow: 0 0 10px #0000ff; }
            50% { box-shadow: 0 0 30px #3333ff, 0 0 60px #0000ff; }
        }

        /* 호스트 캐릭터 */
        .host {
            position: absolute;
            left: -50px;
            top: 50%;
            transform: translateY(-50%);
            width: 120px;
            height: 200px;
            animation: hostWave 2s infinite;
        }

        .host-body {
            width: 80px;
            height: 120px;
            background: linear-gradient(180deg, #4488cc 0%, #336699 100%);
            border-radius: 20px 20px 10px 10px;
            margin: 0 auto;
            position: relative;
        }

        .host-head {
            width: 50px;
            height: 50px;
            background: #ffcc99;
            border-radius: 50%;
            margin: 0 auto 5px;
            position: relative;
        }

        .host-head::after {
            content: '';
            position: absolute;
            top: -10px;
            left: 5px;
            width: 40px;
            height: 20px;
            background: #664400;
            border-radius: 20px 20px 0 0;
        }

        .host-arm {
            position: absolute;
            right: -30px;
            top: 20px;
            width: 40px;
            height: 15px;
            background: #4488cc;
            border-radius: 10px;
            transform-origin: left center;
            animation: armPoint 1.5s infinite;
        }

        @keyframes hostWave {
            0%, 100% { transform: translateY(-50%) translateX(0); }
            50% { transform: translateY(-50%) translateX(10px); }
        }

        @keyframes armPoint {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(20deg); }
        }

        /* 날아다니는 스타 이펙트 */
        .star {
            position: fixed;
            font-size: 2rem;
            animation: starFly 3s linear infinite;
            opacity: 0;
        }

        @keyframes starFly {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Call Now 깜빡이 */
        .call-now {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff0000;
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.2rem;
            animation: callPulse 0.5s infinite alternate;
            cursor: pointer;
            border: 3px solid #ffdd00;
        }

        @keyframes callPulse {
            from { transform: scale(1); box-shadow: 0 0 10px #ff0000; }
            to { transform: scale(1.1); box-shadow: 0 0 30px #ff0000, 0 0 60px #ff6600; }
        }

        /* 원본 이미지 표시 */
        .original-image {
            margin-top: 2rem;
            border: 3px solid #ffdd00;
            border-radius: 15px;
            overflow: hidden;
            animation: imageFloat 4s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(255, 221, 0, 0.3);
        }

        .original-image img {
            width: 100%;
            max-width: 500px;
            display: block;
        }

        @keyframes imageFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        /* 흘러가는 텍스트 */
        .ticker {
            width: 100%;
            overflow: hidden;
            background: rgba(255, 0, 0, 0.8);
            padding: 0.5rem 0;
            margin: 1rem 0;
        }

        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            animation: ticker 15s linear infinite;
            color: #ffdd00;
            font-size: 1.2rem;
        }

        @keyframes ticker {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }

        /* 반응형 */
        @media (max-width: 600px) {
            .price-main { font-size: 3.5rem; }
            .product-area { height: 200px; flex-direction: column; gap: 1rem; }
            .product-bottle { width: 100px; height: 160px; }
            .product-pen { width: 30px; height: 150px; }
            .host { display: none; }
            .website-bar a { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- 배경 반짝이들 -->
    <div class="sparkle" style="top:10%;left:20%;animation-delay:0s;"></div>
    <div class="sparkle" style="top:30%;left:80%;animation-delay:0.5s;"></div>
    <div class="sparkle" style="top:60%;left:15%;animation-delay:1s;"></div>
    <div class="sparkle" style="top:80%;left:70%;animation-delay:1.5s;"></div>
    <div class="sparkle" style="top:20%;left:50%;animation-delay:0.3s;"></div>
    <div class="sparkle" style="top:50%;left:90%;animation-delay:0.8s;"></div>
    <div class="sparkle" style="top:70%;left:40%;animation-delay:1.2s;"></div>
    <div class="sparkle" style="top:90%;left:60%;animation-delay:1.7s;"></div>

    <!-- 날아다니는 별 -->
    <div class="star" style="left:10%;animation-delay:0s;">⭐</div>
    <div class="star" style="left:30%;animation-delay:1s;">✨</div>
    <div class="star" style="left:50%;animation-delay:2s;">⭐</div>
    <div class="star" style="left:70%;animation-delay:0.5s;">✨</div>
    <div class="star" style="left:90%;animation-delay:1.5s;">⭐</div>

    <div class="container">
        <!-- 상단 배너 -->
        <div class="top-banner">🔥 ORDER NOW! 지금 주문하세요! 🔥</div>

        <!-- 가격 -->
        <div class="price-section">
            <div class="price-only">Only</div>
            <div class="price-main">$14<sup>99</sup></div>
            <div class="price-sub">Plus P&H</div>
        </div>

        <!-- 보너스 텍스트 -->
        <div class="bonus-text">🎁 FREE! Portable Pocket Shot 🎁</div>

        <!-- 제품 영역 -->
        <div class="product-area">
            <div class="free-tag">FREE!</div>
            <div class="product-pen"></div>
            <div class="product-bottle"></div>

            <!-- 호스트 캐릭터 -->
            <div class="host">
                <div class="host-head"></div>
                <div class="host-body">
                    <div class="host-arm"></div>
                </div>
            </div>
        </div>

        <!-- 흘러가는 텍스트 -->
        <div class="ticker">
            <span class="ticker-text">
                🌟 ALL NATURAL 🌟 체취 걱정 끝! 🌟 30 DAY MONEY BACK GUARANTEE 🌟 지금 전화하세요! 🌟 ALL NATURAL 🌟 체취 걱정 끝! 🌟 30 DAY MONEY BACK GUARANTEE 🌟
            </span>
        </div>

        <!-- 보증 -->
        <div class="guarantee">✓ 30 Day Money Back Guarantee</div>

        <!-- 원본 이미지 -->
        <div class="original-image">
            <img src="original.jpg" alt="Aspray Product Ad">
        </div>

        <!-- 웹사이트 -->
        <div class="website-bar">
            <a href="#">www.4Aspray.com</a>
        </div>
    </div>

    <!-- Call Now 버튼 -->
    <div class="call-now" onclick="alert('🎉 축하합니다! 이것은 패러디 페이지입니다!')">
        📞 CALL NOW!
    </div>

    <script>
        // 추가 반짝이 동적 생성
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.animationDelay = Math.random() * 2 + 's';
            sparkle.style.width = Math.random() * 4 + 2 + 'px';
            sparkle.style.height = sparkle.style.width;
            document.body.appendChild(sparkle);

            setTimeout(() => sparkle.remove(), 3000);
        }

        setInterval(createSparkle, 300);

        // 가격 색상 변화
        const price = document.querySelector('.price-main');
        const colors = ['#ffffff', '#ffdd00', '#ff6600', '#ffffff', '#00ffaa'];
        let colorIndex = 0;

        setInterval(() => {
            price.style.color = colors[colorIndex];
            colorIndex = (colorIndex + 1) % colors.length;
        }, 800);

        // CALL NOW 버튼 위치 랜덤 이동 (가끔)
        const callBtn = document.querySelector('.call-now');
        setInterval(() => {
            if (Math.random() > 0.7) {
                callBtn.style.transform = `translate(${(Math.random()-0.5)*20}px, ${(Math.random()-0.5)*10}px)`;
            }
        }, 2000);
    </script>
</body>
</html>
